services:
  # FastAPI Web Service
  - type: web
    name: vizard-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && apt-get update && apt-get install -y ffmpeg"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./vizard_saas.db"
      - key: ENVIRONMENT
        value: production
      # S3 Configuration that you will fill in Render Dashboard
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
